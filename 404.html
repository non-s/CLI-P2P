<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Pagina nao encontrada - CLI-P2P</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b13;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }
    main {
      width: min(100%, 580px);
      border: 1px solid rgba(34, 197, 94, 0.35);
      border-radius: 8px;
      background: var(--panel);
      padding: 32px;
    }
    p { color: var(--muted); line-height: 1.6; }
    .code { color: var(--accent); font-weight: 700; }
    h1 { margin: 10px 0 12px; font-size: clamp(2rem, 6vw, 3rem); }
    a {
      display: inline-flex;
      margin-top: 16px;
      color: #03130a;
      background: var(--accent);
      border-radius: 6px;
      padding: 12px 16px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="code">CLI-P2P status: 404</div>
    <h1>Pagina nao encontrada</h1>
    <p>O recurso solicitado nao existe neste site. Volte para a pagina principal do CLI-P2P.</p>
    <a href="/CLI-P2P/">Voltar ao CLI-P2P</a>
  </main>
</body>
</html>
